<!DOCTYPE html>
<html lang="ko"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <title>수술장 간호직 감염관리 퀴즈 🏥 </title>
    <style>
        body {
            max-width: 420px;
            margin: 0 auto; 
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-image: url('main_bg4.png');
            background-color: #f0f8ff;
            background-size: cover;
            background-position: center;
        }

        #entryScreen, #resultScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }
        
        #gameScreen {
            display: none;
            width: 100%;           /* 100vw 대신 100% 사용 */
            max-width: 420px;      /* body와 동일하게 제한 */
            margin: 0 auto;        /* PC에서 중앙 배치 */
            height: 100dvh;
            position: relative;
        }

        #ui {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* center에서 flex-start로 변경 (상단부터 배치) */
            padding: calc(120px + env(safe-area-inset-top)) 16px 20px; /* 점수판 공간(60px) 확보 */
            box-sizing: border-box;
            overflow-y: auto; /* 내용이 많을 경우 내부 스크롤 허용 */
        }
                    
        .score-board {
            position: absolute;
            top: calc(45px + env(safe-area-inset-top));
            z-index: 100;
            font-size: 15px;
            font-weight: bold;
            background: rgba(255,255,255,0.9);
            padding: 8px 14px;
            border-radius: 20px;
            margin-bottom: 10px;
            text-align: center;
            max-width: 92vw;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .question-card {
            width: 100%;
            min-height: 90px;
            max-width: 520px;
            background: rgba(255,255,255,0.96);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            display: flex;
            align-items: center; /* 세로 중앙 */
            justify-content: center; /* 가로 중앙 */
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1.45;
            margin-top: 14px;   /* 점수~문제 거리 */
            overflow: hidden;
            word-break: keep-all;
        }

        .question-card.image-mode {
            width: min(92vw, 520px);
            height: auto;
            min-height: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: visible;
        }
                
        .character-wrap {
            flex: none;
            margin: 30px 0 80px 0;   /* 캐릭터~선택지 거리 */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #characterImg {
            width: min(42vw, 220px);
            max-width: 220px;
            min-width: 120px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #feedback {
            min-height: 40px;
            margin-top: 10px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 8px 16px;
            border-radius: 12px;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .controls {
            width: min(90%, 520px);
            display: flex;
            flex-direction: column;  
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .controls.ox-layout {
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
        }
        
        .controls.ox-layout .btn-answer {
            flex: 1;
            max-width: 240px;
        }

        .btn-answer {
            flex: 1;
            height: 88px;
            border: none;
            border-radius: 20px;
            font-size: 34px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
        }

        .btn-answer:active {
            transform: scale(0.98);
        }

        .btn-o {
            background: #2ecc71;
        }

        .btn-x {
            background: #e74c3c;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #34495e;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .main-btn {
            background-color: #1e8449;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }

        .question-text {
            margin-bottom: 8px;
        }
        
        .image-guide {
            margin-bottom: 12px;
        }

        @media (max-width: 480px) {
            .question-card {
                font-size: 17px;
                min-height: 70px;
                padding: 14px 12px;
                line-height: 1.4;
            }
        
            .btn-answer {
                height: 72px;
                font-size: 28px;
            }
        
            .btn-mcq {
                border: none;
                border-radius: 10px;
                padding: 12px 10px;
                font-size: 14px;
                font-weight: 700;
                color: #2c3e50;
                background: white;
                cursor: pointer;
                box-shadow: 0 4px 10px rgba(0,0,0,0.16);
                line-height: 1.4;
                word-break: keep-all;
                min-height: 44px;
            }
        
            #feedback {
                font-size: 18px;
            }
        
            .image-guide {
                font-size: 14px;   /* 18px에서 14px로 축소 */
                font-weight: 600;
                color: #555;       /* 약간 부드러운 색상으로 변경 */
                background: rgba(255,255,255,0.8);
                padding: 4px 10px; /* 상하 여백 축소 */
                border-radius: 10px;
            }

            .image-question-wrap {    
                width: 100%;
                max-width: 900px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                margin: 0 auto;
                gap: 8px;                /*퀴즈 문제~캐릭터 간격 조정*/
                padding-top: 10px;
            }
            
            .image-board {
                position: relative;
                width: 100%;
                max-width: 600px;
                aspect-ratio: auto;   
                border-radius: 16px;
                overflow: hidden;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                background: white;
                padding-bottom: 50px;
                margin-top: 10px;
            }
            
            .image-board img {
                width: 100%;
                height: 100%;
                object-fit: contain;  /* 🔥 확대 방지 */
                display: block;
            }
                                
            .hit-circle {
                position: absolute;
                transform: translate(-50%, -50%);
                border-radius: 50%;
                pointer-events: none;
                border: 5px solid #ff0000; 
                box-shadow: 
                    inset 0 0 4px rgba(0,0,0,0.3), /* 안쪽 그림자로 오목한 느낌 */
                    0 0 8px rgba(255, 0, 0, 0.5),   /* 바깥쪽 은은한 붉은 광채 */
                    0 2px 4px rgba(0,0,0,0.2);     /* 바닥면 그림자 */
                
                background: transparent;
                animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 살짝 튕기는 듯한 등장 */
                z-index: 50;
            }
            
            /* 🔽 틀린그림 3개 (작게) - Apple 링 느낌 유지 */
            .hit-circle.small {
                width: 20px;   /* 기존 20px에서 약간 키워 가독성 확보 */
                height: 20px;
                max-width: 20px;
                max-height: 20px;
                border-width: 2px; /* 작은 원은 선을 살짝 가늘게 */
            }
            
            /* 🔽 틀린그림 1개 (크게) */
            .hit-circle.large {
                width: 70px;
                height: 70px;
                max-width: 70px;
                max-height: 70px;
                border-width: 7px; /* 큰 원은 선을 더 두껍고 입체감 있게 */
            }
            
            /* 등장 애니메이션 (더 생동감 있게 수정) */
            @keyframes popIn {
                from {
                    transform: translate(-50%, -50%) scale(0.3);
                    opacity: 0;
                }
                to {
                    transform: translate(-50%, -50%) scale(1);
                    opacity: 1;
                }
            }

        .mcq-grid {
            width: min(90%, 520px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .btn-mcq {
            border: none;
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 13px;
            font-weight: 700;
            color: #2c3e50;        /* 검은 글씨 */
            background: white;     /* 흰색 배경 */
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
            line-height: 1.2;
            word-break: keep-all;
        }

        .btn-mcq:active {
            transform: scale(0.98);
        }

        .image-guide {
            font-size: 12px;
            font-weight: 500;
            color: #1e8449;
            background: none;
            padding: 0;
            margin-top: 2px;        
            display: block;         
            text-align: center;
          }

        .mcq-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .submit-btn {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 10px;
            background: #ddd;   /* 연회색 */
            color: #2c3e50;
            border: none;
            cursor: pointer;
        }
            
    </style>
</head>
<body>

    <div id="entryScreen">
            <h2 style="color:#2c3e50; margin-top: 0; line-height: 1.3; text-align: center;">
                🏥 수술장 감염관리 퀴즈<br>
                <span style="font-size: 18px; color: #1e8449; font-weight: 700;">간호직 ver.</span>
            </h2>
    
            <div class="input-group">
                <label>소속</label>
                <input type="text" id="affiliationInput" placeholder="소속 입력">
            </div>
    
            <div class="input-group">
                <label>이름</label>
                <input type="text" id="nameInput" placeholder="이름 입력">
            </div>
    
            <div style="font-size: 14px; color: #666; line-height: 1.6; margin: 35px 0 35px 0; word-break: keep-all; text-align: center;">
                수술장에 부착된 포스터와 식당에서 재생되는 동영상에<br>
                퀴즈의 힌트가 있으니 참고해주세요 🍀
            </div>
    
            <button class="main-btn" onclick="startGame()">Start Game</button>
        </div>

    <div id="gameScreen">
        <div id="ui">
            <div class="score-board">
                <span id="playerInfo"></span> |
                점수: <span id="scoreVal">0</span>점 |
                진행: <span id="progressVal">1</span>/<span id="totalVal">0</span> |
                시간: <span id="timeVal">0</span>초
            </div>

            <div id="questionCard" class="question-card">
                문제를 불러오는 중...
            </div>

            <div id="feedback"></div>

            <div class="character-wrap">
                <img id="characterImg" src="icon.png" alt="캐릭터">
            </div>

            <div class="controls">
                <button class="btn-answer btn-o" onclick="chooseAnswer('O')">O</button>
                <button class="btn-answer btn-x" onclick="chooseAnswer('X')">X</button>
            </div>
        </div>
    </div>

    <div id="resultScreen" style="display:none;">
        <h2 id="resultTitle" style="color:#2c3e50; margin-top: 0; line-height: 1.4; word-break: keep-all;"></h2>
        
        <p id="finalScore" style="font-size: 26px; font-weight: bold; color: #1e8449; margin: 10px 0;"></p>
        <p id="finalComment" style="font-size: 16px; line-height: 1.5; color: #555; margin-bottom: 20px;"></p>

        <div style="background: #f0fff4; padding: 18px; border-radius: 15px; border: 2px dashed #2ecc71; margin-bottom: 25px; font-size: 14px; color: #2c3e50; line-height: 1.6;">
            📸 이 화면을 <strong>캡쳐</strong>하여,<br>
            식당 입구 <strong>감염관리팀 직원</strong>에게 보여주시면<br>
            맛있는 음료수를 드립니다 🥤🤍
        </div>
    </div>

<script>
    const quizData = [
        {
            type: "OX",
            q: "손소독제를 많이 펌프할수록 소독 효과가 뛰어나다.",
            a: "X",
            explanation: "소독제는 적당량을 바르고 완전히 건조되어야 미생물 사멸 효과를 나타냅니다."
        },
        {
            type: "OX",
            q: "외과적 손소독 시 1분 이상 팔꿈치 위 5cm까지 모든 부위를 소독해야 한다.",
            a: "X",
            explanation: "외과적 손소독 시 2분 이상 스크럽이 필요합니다."
        },
        {
            type: "MULTI",
            q: "수술부위감염 예방 번들에 포함되는 항목을<br>모두 선택해주세요.",
            options: [
                "적절한 외과적 손소독",
                "수술 중 충분한 산소 공급",
                "예상 절개부위를 넘어가지 않도록 국소부위만 피부 소독",
                "정상 체온 유지"
            ],
            a: [0, 1, 3],
            explanation: "수술부위감염 예방 번들에는 상기 항목이 포함되어야 하며, 예상 절개부위 이상 광범위하게 피부 소독해야 합니다."
        },
        {
            type: "IMAGE_MULTI",
            q: "틀린 부분을 모두 찾으세요. (3개)",
            img: "OP.png",
            targets: [
                { id: "waist", x: 0.24, y: 0.62, radius: 0.08 }, // 만약 더 위로 올리고 싶다면? y를 낮추기
                { id: "hair",  x: 0.65, y: 0.40, radius: 0.05 }, // 만약 더 오른쪽으로 밀고 싶다면? x를 높이기
                { id: "nose",  x: 0.76, y: 0.43, radius: 0.05 }  
            ],
                explanation: "모자 밖 머리카락 노출, 마스크 밖 코 노출, 가운 허리끈 풀림은 모두 감염관리 측면에서 부적절합니다."
        },
        {
            type: "MCQ",
            q: "손위생이 필요하지 않은 시점은?",
            options: [
                "환자 접촉 전",
                "체액 노출 위험 후",
                "환자 주변 물품 접촉 전",
                "환자 접촉 후"
            ],
            a: 2,
            explanation: "환자 주변 물품 접촉 전은 WHO 손위생 5가지 시점에 포함되지 않습니다."
        },
        {
            type: "OX",
            q: "여성 환자에게 유치도뇨관을 삽입하기 전 요도구만 깨끗하게 닦으면 된다.",
            a: "X",
            explanation: "삽입 전에는 적절한 순서에 따라 충분히 소독해야 합니다."
        },
        {
            type: "OX",
            q: "중심정맥관 투약 전,<br>허브는 4회만 소독하면 충분하다.",
            a: "X",
            explanation: "중심정맥관 투약 전에는 허브를 6회 이상 쥐어짜듯 소독해야 합니다."
        },
        {
            type: "IMAGE_SINGLE",
            q: "외과적 손소독 시, alcohol rub에<br>가장 먼저 담가야 할 것은?",
            img: "Handrub.png",
            targets: [
                { id: "fingertips", x: 0.44, y: 0.12, radius: 0.16 }
            ],
            explanation: "한쪽 손에 alcohol rub을 받은 후, 반대편 손끝을 담가 손톱 밑과 손가락 끝을 충분히 소독합니다."
        }
    ];

    let startTime = 0;
    let timerInterval = null;
    let score = 0;
    let currentQIndex = 0;
    let isAnswerLocked = false;
    let currentAffiliation = '';
    let currentName = '';

    let foundTargets = new Set();
    let selectedMulti = new Set();
    let timer = null;

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUn6qcbVWwCKAoYQvSqABKpkpMLV0ln_DBgiqSiO8JO6SYZZKhEWqK9PFjQ5YkQv9Z/exec';
    const SHEET_NAME = "간호직"; 
    
    function saveResultToSheet(affiliation, name, score, time) {
        const formData = new FormData();
        formData.append('affiliation', affiliation);
        formData.append('name', name);
        formData.append('score', score);
        formData.append('time', time);
        formData.append('sheetName', SHEET_NAME);
    
        fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
        });
    }

    function startGame() {
        clearInterval(timerInterval);
        const affiliation = document.getElementById('affiliationInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();

        if (!name) {
            alert("이름을 입력해 주세요!");
            return;
        }

        if (!affiliation) {
            alert("소속을 입력해 주세요!");
            return;
        }

        currentAffiliation = affiliation;
        currentName = name;
        startTime = Date.now();

        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const timeEl = document.getElementById('timeVal');
            if (timeEl) {
                timeEl.innerText = elapsed;
            }
        }, 1000);

        document.getElementById('characterImg').src = 'icon.png'; //

        document.getElementById('playerInfo').innerText = `${affiliation} ${name}`.trim();
        document.getElementById('entryScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        document.getElementById('feedback').innerText = "";
        document.getElementById('feedback').style.marginTop = "20px";
        document.getElementById('feedback').style.position = "static";
        
        score = 0;
        currentQIndex = 0;
        isAnswerLocked = false;

        document.getElementById('scoreVal').innerText = score;
        document.getElementById('totalVal').innerText = quizData.length;
        showQuestion();
    }

    function showQuestion() {
        const charWrap = document.querySelector('.character-wrap');
        const current = quizData[currentQIndex];
        const card = document.getElementById('questionCard');
        const controls = document.querySelector('.controls');

        controls.classList.remove("ox-layout");
        card.classList.remove('image-mode');

        document.getElementById('progressVal').innerText = currentQIndex + 1;
        document.getElementById('feedback').innerText = "";
        document.getElementById('feedback').style.color = "#2c3e50";
        document.getElementById('feedback').style.background = "transparent";

        isAnswerLocked = false;
        foundTargets = new Set();
        controls.innerHTML = "";
        selectedMulti.clear();  

        charWrap.style.display = "flex"; // 캐릭터를 일단 보이게 설정

            if (current.type === "OX") {
                charWrap.style.marginBottom = "80px"; // OX는 지금처럼 넓게!
            } else {
                charWrap.style.marginBottom = "15px"; // 객관식/다중선택은 좁게! (원하는 수치로 조절 가능)
            }
        
            if (current.type === "OX") {
                controls.classList.add("ox-layout");
                card.innerHTML = `<div>${current.q}</div>`;
                controls.innerHTML = `
                    <button class="btn-answer btn-o" onclick="chooseAnswer('O')">O</button>
                    <button class="btn-answer btn-x" onclick="chooseAnswer('X')">X</button>
                `;
            }

        else if (current.type === "MCQ") {
            charWrap.style.display = "flex";
            card.innerHTML = `<div>${current.q}</div>`;
            controls.innerHTML = `
                <div class="mcq-options">
                    ${current.options.map((opt, idx) => `
                        <button class="btn-mcq" onclick="chooseMCQ(${idx})">
                            ${opt}
                        </button>
                    `).join("")}
                </div>
            `;
        }
            
       else if (current.type === "MULTI") {
            charWrap.style.display = "flex";
            card.innerHTML = `<div>${current.q}</div>`;
        
            controls.innerHTML = `
                <div class="mcq-options">
                    ${current.options.map((opt, idx) => `
                        <button class="btn-mcq" onclick="toggleMulti(${idx})" id="multi-${idx}">
                            ${opt}
                        </button>
                    `).join("")}
                </div>

                <button class="submit-btn" onclick="submitMulti()">제출</button>
            `;   
        }

        else if (current.type === "IMAGE_SINGLE" || current.type === "IMAGE_MULTI") {
            charWrap.style.display = "none";
            card.classList.add('image-mode');
            controls.innerHTML = ""; //
        
            let timeLimit = current.type === "IMAGE_SINGLE" ? 15 : 30;
        
            card.innerHTML = `
                <div class="image-question-wrap">
                    <div class="question-text">
                        ${current.q}
                    </div>
                    <div class="image-guide">시간 제한 ${timeLimit}초</div>
                    <div id="imageBoard" class="image-board">
                        <img id="quizImage" src="${current.img}">
                    </div>
                </div>
            `;
        
            const img = document.getElementById("quizImage");
            img.onclick = handleImageClick;
        
            clearTimeout(timer);
            timer = setTimeout(() => {
                if (!isAnswerLocked) {
                    handleResult(false); 
                }
            }, timeLimit * 1000);
        }
    }
        
    function chooseAnswer(choice) {
        const current = quizData[currentQIndex];
        handleResult(choice === current.a);
    }

    function chooseMCQ(idx) {
        const current = quizData[currentQIndex];
        handleResult(idx === current.a);
    }

    function toggleMulti(idx) {
        const btn = document.getElementById(`multi-${idx}`);

        if (selectedMulti.has(idx)) {
            selectedMulti.delete(idx);
            btn.style.background = "white";
            btn.style.color = "#2c3e50";
            
        } else {
            selectedMulti.add(idx);
            btn.style.background = "#2ecc71";
            btn.style.color = "white";
        }
    }

    function submitMulti() {
        const current = quizData[currentQIndex];
    
        const correct = current.a;
        const selected = Array.from(selectedMulti);
    
        const isCorrect =
            selected.length === correct.length &&
            selected.every(v => correct.includes(v));
    
        selectedMulti.clear();
        handleResult(isCorrect);
    }

    function handleImageClick(e) {
        if (isAnswerLocked) return;

        const current = quizData[currentQIndex];
        const img = e.target;
        const rect = img.getBoundingClientRect();
        
        const naturalWidth = img.naturalWidth;
        const naturalHeight = img.naturalHeight;
        
        const displayedWidth = rect.width;
        const displayedHeight = rect.height;
        
        // 이미지 실제 비율
        const imageRatio = naturalWidth / naturalHeight;
        const boxRatio = displayedWidth / displayedHeight;
        
        let offsetX = 0;
        let offsetY = 0;
        let effectiveWidth = displayedWidth;
        let effectiveHeight = displayedHeight;
        
        // 🔥 레터박스 보정
        if (imageRatio > boxRatio) {
            // 좌우 꽉, 위아래 여백
            effectiveHeight = displayedWidth / imageRatio;
            offsetY = (displayedHeight - effectiveHeight) / 2;
        } else {
            // 위아래 꽉, 좌우 여백
            effectiveWidth = displayedHeight * imageRatio;
            offsetX = (displayedWidth - effectiveWidth) / 2;
        }
        
        // 🔥 최종 좌표
        const x = (e.clientX - rect.left - offsetX) / effectiveWidth;
        const y = (e.clientY - rect.top - offsetY) / effectiveHeight;
        
        let hit = null;

        for (const t of current.targets) {
            if (foundTargets.has(t.id)) continue;

            const dx = x - t.x;
            const dy = y - t.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < t.radius) {
                hit = t;
                break;
            }
        }

        if (!hit) {
            document.getElementById('feedback').innerText = "다시 찾아보세요!";
            feedback.style.color = "#fff";
            document.getElementById('feedback').style.color = "#e74c3c";
            
                navigator.vibrate?.(50); // 🔥 추가
                return;
            }
        
        foundTargets.add(hit.id);
        drawCircle(hit, img);

        // 1번 문제 (1개만 찾으면 끝)
        if (current.type === "IMAGE_SINGLE") {
            handleResult(true);
            return;
        }

        // 4번 문제 (3개 다 찾아야 끝)
        if (foundTargets.size === current.targets.length) {
            handleResult(true);
        } else {
            document.getElementById('feedback').innerText =
                `정답! ${current.targets.length - foundTargets.size}개 남음`;
        }
        }

    function handleResult(isCorrect) {
        if (isAnswerLocked) return;
        isAnswerLocked = true;

        clearTimeout(timer);

        const feedback = document.getElementById('feedback');
        const img = document.getElementById('characterImg');

        if (isCorrect) {
            score += 10;
            feedback.innerText = "✔ 정답!";
            feedback.style.color = "#fff";
            feedback.style.background = "#27ae60";
            img.src = 'icon_happy.png';
        } else {
            feedback.innerText = "✖ 오답!";
            feedback.style.color = "#fff";
            feedback.style.background = "#e74c3c";
            img.src = 'icon_sad.png';
        }

        document.getElementById('scoreVal').innerText = score;

        setTimeout(() => {
            document.getElementById('characterImg').src = 'icon.png';
            currentQIndex++;

            if (currentQIndex >= quizData.length) {
                endGame();
            } else {
                showQuestion();
            }
        }, 1200);
    }
    
    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';

        // 1. 이름 삽입
        document.getElementById('resultTitle').innerText = `${currentName}님 수고하셨습니다 🙇‍♀️🙇‍♂️`;
        
        // 2. 점수 삽입
        document.getElementById('finalScore').innerText = `최종 점수: ${score}점`;

        // 3. 점수별 코멘트 (추천 멘트로 변경)
        let comment = "";
        if (score >= 80) {
            comment = "당신은 우리 수술장의 감염관리 마스터! 🏥✨";
        } else if (score >= 50) {
            comment = "훌륭합니다!<br>안전한 수술실 환경을 위해 조금만 더 힘내주세요! 👍";
        } else {
            comment = "감염관리 수칙을 다시 한번 복습해볼까요? ✍️";
        }
        document.getElementById('finalComment').innerText = comment;

        // 4. 결과 저장
        const totalTime = Math.floor((Date.now() - startTime) / 1000);
        saveResultToSheet(currentAffiliation, currentName, score, totalTime);
    }

    document.getElementById('nameInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') startGame();
    });

    document.getElementById('affiliationInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') startGame();
    });
    

    function drawCircle(target, img) {
        const board = document.getElementById('imageBoard');
        const circle = document.createElement("div");
        const current = quizData[currentQIndex];
    
        circle.className = (current.type === "IMAGE_MULTI") ? "hit-circle small" : "hit-circle large";
    
        const rect = img.getBoundingClientRect();
        const boardRect = board.getBoundingClientRect(); // 보드 전체 기준 좌표
    
        // 이미지 실제 비율 계산 (레터박스 제외 순수 이미지 영역 찾기)
        const naturalRatio = img.naturalWidth / img.naturalHeight;
        const displayedRatio = rect.width / rect.height;
    
        let effectiveWidth, effectiveHeight, offsetX, offsetY;
    
        if (naturalRatio > displayedRatio) {
            effectiveWidth = rect.width;
            effectiveHeight = rect.width / naturalRatio;
            offsetX = 0;
            offsetY = (rect.height - effectiveHeight) / 2;
        } else {
            effectiveHeight = rect.height;
            effectiveWidth = rect.height * naturalRatio;
            offsetX = (rect.width - effectiveWidth) / 2;
            offsetY = 0;
        }
    
        // 🔥 보드(흰색 배경 포함) 내에서의 정확한 위치 계산
        // 이미지의 화면상 시작점(rect.left/top)에서 보드의 시작점(boardRect.left/top)을 뺍니다.
        const imgLeftInBoard = rect.left - boardRect.left;
        const imgTopInBoard = rect.top - boardRect.top;
    
        const leftPx = imgLeftInBoard + offsetX + (target.x * effectiveWidth);
        const topPx = imgTopInBoard + offsetY + (target.y * effectiveHeight);
    
        // %가 아닌 px로 고정 위치 지정 (보드 내부 기준)
        circle.style.left = leftPx + "px";
        circle.style.top = topPx + "px";
    
        board.appendChild(circle);
    }
        
    function drawDebugTargets(img, targets) {
        const board = document.getElementById('imageBoard');

        targets.forEach(target => {
            const dot = document.createElement("div");
            dot.style.position = "absolute";
            dot.style.width = "16px";
            dot.style.height = "16px";
            dot.style.background = "rgba(255,0,0,0.8)";
            dot.style.borderRadius = "50%";
            dot.style.transform = "translate(-50%, -50%)";
            dot.style.left = (target.x * 100) + "%";
            dot.style.top = (target.y * 100) + "%";
            dot.style.pointerEvents = "none";
             board.appendChild(dot);
        });
    }
    
        
</script>
</body>
