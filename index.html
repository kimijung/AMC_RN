<!DOCTYPE html>
<html lang="ko"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC 수술실 감염관리 챌린지 🏥</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-image: url('main_bg3.png');
            background-color: #f0f8ff;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #entryScreen, #resultScreen {
            background: rgba(255, 255, 255, 0.95);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }

        #gameScreen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        #ui {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            box-sizing: border-box;
            justify-content: center;
        }

        .score-board {
            font-size: 17px;
            font-weight: bold;
            background: rgba(255,255,255,0.9);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 4px;
            margin-bottom: 16px;
            text-align: center;
        }

        .question-card {
            width: min(88%, 520px);
            min-height: 120px;
            background: rgba(255,255,255,0.96);
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            display: block;
            text-align: center;
            padding: 24px 20px;
            box-sizing: border-box;
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1.5;
            margin-top: 12px;
        }

        .question-card.image-mode {
            width: min(95vw, 980px);
            padding: 20px;
        }
        
        .character-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 🔥 2열 */
            gap: 12px;
        }

        #characterImg {
            width: min(42vw, 220px);
            max-width: 220px;
            min-width: 120px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #feedback {
            min-height: 34px;
            margin-top: 8px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        .controls {
            width: min(90%, 520px);
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 28px;
        }

        .btn-answer {
            flex: 1;
            height: 88px;
            border: none;
            border-radius: 20px;
            font-size: 34px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
        }

        .btn-answer:active {
            transform: scale(0.98);
        }

        .btn-o {
            background: #2ecc71;
        }

        .btn-x {
            background: #e74c3c;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #34495e;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .main-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width: 480px) {
            .question-card {
                font-size: 20px;
                min-height: 110px;
                padding: 20px 16px;
            }

            .btn-answer {
                height: 80px;
                font-size: 30px;
            }

            #feedback {
                font-size: 20px;
            }
        }

            .image-question-wrap {
                width: 100%;
                max-width: 900px;
            
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            
                margin: 0 auto;
                gap: 12px;
            }
            
            .image-board {
                position: relative;
                width: 100%;
                max-width: 760px;
            
                display: flex;
                justify-content: center;
                align-items: center;
            
                margin: 0 auto;
            
                border-radius: 16px;
                overflow: hidden;
                box-shadow: 0 8px 20px rgba(0,0,0,0.15);
                background: white;
            }
            
            .image-board img {
                max-width: 100%;
                max-height: 80vh;
            
                width: auto;
                height: auto;
            
                display: block;
                object-fit: contain;
            }

        .hit-circle {
            position: absolute;
            width: 46px;
            height: 46px;
            border: 4px solid #e74c3c;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.7);
            animation: popIn 0.18s ease-out;
        }

        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0.4);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .mcq-grid {
            width: min(90%, 520px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .btn-mcq {
            border: none;
            border-radius: 16px;
            padding: 16px 14px;
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;        /* 검은 글씨 */
            background: white;     /* 흰색 배경 */
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
        }

        .btn-mcq:active {
            transform: scale(0.98);
        }

        .image-guide {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            background: rgba(255,255,255,0.92);
            padding: 10px 14px;
            border-radius: 14px;
        }    

        .mcq-options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        width: 100%;
    }
            
    </style>
</head>
<body>

    <div id="entryScreen">
        <h2 style="color:#2c3e50; margin-top: 0;">🏥 감염관리 챌린지</h2>

        <div class="input-group">
            <label>소속</label>
            <input type="text" id="affiliationInput" placeholder="소속 입력">
        </div>

        <div class="input-group">
            <label>이름</label>
            <input type="text" id="nameInput" placeholder="이름 입력">
        </div>

        <button class="main-btn" onclick="startGame()">Start Game</button>
    </div>

    <div id="gameScreen">
        <div id="ui">
            <div class="score-board">
                <span id="playerInfo"></span> |
                점수: <span id="scoreVal">0</span> |
                진행: <span id="progressVal">1</span>/<span id="totalVal">0</span>
            </div>

            <div id="questionCard" class="question-card">
                문제를 불러오는 중...
            </div>

            <div id="feedback"></div>

            <div class="character-wrap">
                <img id="characterImg" src="icon.png" alt="캐릭터">
            </div>

            <div class="controls">
                <button class="btn-answer btn-o" onclick="chooseAnswer('O')">O</button>
                <button class="btn-answer btn-x" onclick="chooseAnswer('X')">X</button>
            </div>
        </div>
    </div>

    <div id="resultScreen" style="display:none;">
        <h2 style="color:#2c3e50; margin-top: 0;">수고하셨습니다!</h2>
        <p id="finalScore" style="font-size: 24px; font-weight: bold;"></p>
        <p id="finalComment" style="font-size: 18px; line-height: 1.5;"></p>
        <button class="main-btn" onclick="location.reload()">다시 하기</button>
    </div>

<script>
    const quizData = [
        {
            type: "OX",
            q: "손소독제를 많이 펌프할수록 소독 효과가 뛰어나다.",
            a: "X",
            explanation: "소독제는 적당량을 바르고 완전히 건조되어야 미생물 사멸 효과를 나타냅니다."
        },
        {
            type: "OX",
            q: "외과적 손소독 시 1분 이상 팔꿈치 위 5cm까지 모든 부위를 소독해야 한다.",
            a: "X",
            explanation: "외과적 손소독 시 2분 이상 스크럽이 필요합니다."
        },
        {
            type: "MULTI",
            q: "수술부위감염 예방 번들에 포함되는 항목을 모두 선택해주세요.",
            options: [
                "적절한 외과적 손소독",
                "수술 중 충분한 산소 공급",
                "예상 절개부위를 넘어가지 않도록 국소부위만 피부 소독",
                "정상 체온 유지"
            ],
            a: [0, 1, 3],
            explanation: "수술부위감염 예방 번들에는 상기 항목이 포함되어야 하며, 예상 절개부위 이상 광범위하게 피부 소독해야 합니다."
        },
        {
            type: "IMAGE_MULTI",
            q: "틀린 부분을 모두 찾으세요. (3개)",
            img: "OP.png",
            targets: [
                    { id: "waist", x: 0.43, y: 0.72, radius: 0.08 },   // 가운끈
                    { id: "hair", x: 0.58, y: 0.32, radius: 0.07 },    // 가운데 남자 머리
                    { id: "nose", x: 0.78, y: 0.42, radius: 0.07 }     // 오른쪽 남자 코
                ],
            explanation: "모자 밖 머리카락 노출, 마스크 밖 코 노출, 가운 허리끈 풀림은 모두 감염관리 측면에서 부적절합니다."
        },
        {
            type: "MCQ",
            q: "손위생이 필요하지 않은 시점은?",
            options: [
                "환자 접촉 전",
                "체액 노출 위험 후",
                "환자 주변 물품 접촉 전",
                "환자 접촉 후"
            ],
            a: 2,
            explanation: "환자 주변 물품 접촉 전은 WHO 손위생 5가지 시점에 포함되지 않습니다."
        },
        {
            type: "OX",
            q: "여성 환자에게 유치도뇨관을 삽입하기 전 요도구만 깨끗하게 닦으면 된다.",
            a: "X",
            explanation: "삽입 전에는 적절한 순서에 따라 충분히 소독해야 합니다."
        },
        {
            type: "OX",
            q: "중심정맥관 투약 전, 허브는 4회만 소독하면 충분하다.",
            a: "X",
            explanation: "중심정맥관 투약 전에는 허브를 6회 이상 쥐어짜듯 소독해야 합니다."
        },
        {
            type: "IMAGE_SINGLE",
            q: "외과적 손소독 시, alcohol rub에 가장 먼저 담가야 할 것은?",
            img: "Handrub.png",
            targets: [
                { id: "fingertips", x: 0.50, y: 0.12, radius: 0.12 }
            ],
            explanation: "한쪽 손에 alcohol rub을 받은 후, 반대편 손끝을 담가 손톱 밑과 손가락 끝을 충분히 소독합니다."
        }
    ];

    let score = 0;
    let currentQIndex = 0;
    let isAnswerLocked = false;
    let currentAffiliation = '';
    let currentName = '';

    let foundTargets = new Set();
    let selectedMulti = new Set();
    let timer = null;

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxe5NjMLeJ0Fa_VIxEidrmFmsg7J1BH5awJhP72_SSiwdGMvmGNvAgRvzBZacjzNpVG/exec';

    function saveResultToSheet(affiliation, name, score) {
        const formData = new FormData();
        formData.append('affiliation', affiliation);
        formData.append('name', name);
        formData.append('score', score);

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
        }).catch(error => {
            console.error('저장 실패:', error);
        });
    }

    function startGame() {
        const affiliation = document.getElementById('affiliationInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();

        if (!name) {
            alert("이름을 입력해 주세요!");
            return;
        }

        currentAffiliation = affiliation;
        currentName = name;

         document.getElementById('characterImg').src = 'icon.png'; //

        document.getElementById('playerInfo').innerText = `${affiliation} ${name}`.trim();
        document.getElementById('entryScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        document.getElementById('feedback').innerText = "";
        document.getElementById('feedback').style.marginTop = "20px";
        document.getElementById('feedback').style.position = "static";
        
        score = 0;
        currentQIndex = 0;
        isAnswerLocked = false;

        document.getElementById('scoreVal').innerText = score;
        document.getElementById('totalVal').innerText = quizData.length;
        showQuestion();
    }

    function showQuestion() {
        const charWrap = document.querySelector('.character-wrap');
        const current = quizData[currentQIndex];
        const card = document.getElementById('questionCard');
        const controls = document.querySelector('.controls');

        card.classList.remove('image-mode');

        document.getElementById('progressVal').innerText = currentQIndex + 1;
        document.getElementById('feedback').innerText = "";
        document.getElementById('feedback').style.color = "#2c3e50";

        isAnswerLocked = false;
         foundTargets = new Set();
        controls.innerHTML = "";

        if (current.type === "OX") {
            charWrap.style.display = "flex";
            card.innerHTML = `<div>${current.q}</div>`;
            controls.innerHTML = `
                <button class="btn-answer btn-o" onclick="chooseAnswer('O')">O</button>
                <button class="btn-answer btn-x" onclick="chooseAnswer('X')">X</button>
            `;
        }

        else if (current.type === "MCQ") {
            charWrap.style.display = "flex";
            card.innerHTML = `<div>${current.q}</div>`;
            controls.innerHTML = current.options.map((opt, idx) => `
                <button class="btn-mcq" onclick="chooseMCQ(${idx})">
                    ${opt}
                </button>
            `).join("");
        }

       else if (current.type === "MULTI") {
            charWrap.style.display = "flex";
            card.innerHTML = `<div>${current.q}</div>`;
        
            controls.innerHTML = `
                <div class="mcq-options">
                    ${current.options.map((opt, idx) => `
                        <button class="btn-mcq" onclick="toggleMulti(${idx})" id="multi-${idx}">
                            ${opt}
                        </button>
                    `).join("")}
                </div>

                <button class="main-btn" onclick="submitMulti()">제출</button>
            `;   

        else if (current.type === "IMAGE_SINGLE" || current.type === "IMAGE_MULTI") {
            charWrap.style.display = "none";
            card.classList.add('image-mode');
        
            let timeLimit = current.type === "IMAGE_SINGLE" ? 20 : 30;
        
            card.innerHTML = `
                <div class="image-question-wrap">
                    <div>${current.q}</div>
                    <div class="image-guide">${timeLimit}초 시간 제한</div>
                    <div id="imageBoard" class="image-board">
                        <img id="quizImage" src="${current.img}">
                    </div>
                </div>
            `;
        
            const img = document.getElementById("quizImage");
            img.onclick = handleImageClick;
        
            // ⏱ 타이머 시작
            clearTimeout(timer);
            timer = setTimeout(() => {
                if (!isAnswerLocked) {
                    handleResult(false); // 틀린 것으로 처리
                }
            }, timeLimit * 1000);
        }
        }
        
    function chooseAnswer(choice) {
        const current = quizData[currentQIndex];
        handleResult(choice === current.a);
    }

    function chooseMCQ(idx) {
        const current = quizData[currentQIndex];
        handleResult(idx === current.a);
    }

    function toggleMulti(idx) {
        const btn = document.getElementById(`multi-${idx}`);

        if (selectedMulti.has(idx)) {
            selectedMulti.delete(idx);
            btn.style.background = "white";
            btn.style.color = "#2c3e50";
            
        } else {
            selectedMulti.add(idx);
            btn.style.background = "#2ecc71";
            btn.style.color = "white";
        }
    }

    function submitMulti() {
        const current = quizData[currentQIndex];
    
        const correct = current.a;
        const selected = Array.from(selectedMulti);
    
        const isCorrect =
            selected.length === correct.length &&
            selected.every(v => correct.includes(v));
    
        selectedMulti.clear();
        handleResult(isCorrect);
    }

    function handleImageClick(e) {
        if (isAnswerLocked) return;

        const current = quizData[currentQIndex];
        const img = e.target;
        const rect = img.getBoundingClientRect();

        // 클릭 위치 → 실제 이미지 좌표로 변환
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;

        let hit = null;

        for (const t of current.targets) {
            if (foundTargets.has(t.id)) continue;

            const dx = x - t.x;
            const dy = y - t.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < t.radius) {
                hit = t;
                break;
            }
        }

        if (!hit) {
            document.getElementById('feedback').innerText = "다시 찾아보세요!";
            document.getElementById('feedback').style.color = "#e74c3c";
            return;
        }

        foundTargets.add(hit.id);
        drawCircle(hit, img);

        // 1번 문제 (1개만 찾으면 끝)
        if (current.type === "IMAGE_SINGLE") {
            handleResult(true);
            return;
        }

        // 4번 문제 (3개 다 찾아야 끝)
        if (foundTargets.size === current.targets.length) {
            handleResult(true);
        } else {
            document.getElementById('feedback').innerText =
                `정답! ${current.targets.length - foundTargets.size}개 남음`;
        }
        }

    function handleResult(isCorrect) {
        if (isAnswerLocked) return;
        isAnswerLocked = true;

        clearTimeout(timer);

        const feedback = document.getElementById('feedback');
        const img = document.getElementById('characterImg');

        if (isCorrect) {
            score += 10;
            feedback.innerText = "정답!";
            feedback.style.color = "#27ae60";
            img.src = 'icon_happy.png';
        } else {
            feedback.innerText = "오답!";
            feedback.style.color = "#c0392b";
            img.src = 'icon_sad.png';
        }

        document.getElementById('scoreVal').innerText = score;

        setTimeout(() => {
            document.getElementById('characterImg').src = 'icon.png';
            currentQIndex++;

            if (currentQIndex >= quizData.length) {
                endGame();
            } else {
                showQuestion();
            }
        }, 1200);
    }
    
    function endGame() {
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        document.getElementById('finalScore').innerText = `최종 점수: ${score}점`;

        let comment = "";
        if (score >= 70) {
            comment = "훌륭합니다! 감염관리 기본 수칙을 잘 이해하고 있습니다.";
        } else if (score >= 40) {
            comment = "좋습니다. 몇 가지 핵심 수칙을 더 복습하면 더 좋아집니다.";
        } else {
            comment = "기본 감염관리 수칙을 다시 한 번 복습해 보세요.";
        }

        document.getElementById('finalComment').innerText = comment;

        saveResultToSheet(currentAffiliation, currentName, score);
    }

    document.getElementById('nameInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') startGame();
    });

    document.getElementById('affiliationInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') startGame();
    });

    function drawCircle(target, img) {
        const board = document.getElementById('imageBoard');

        const circle = document.createElement("div");
        circle.className = "hit-circle";

        circle.style.left = (target.x * 100) + "%";
        circle.style.top = (target.y * 100) + "%";

        board.appendChild(circle);
    }

    function drawDebugTargets(img, targets) {
        const board = document.getElementById('imageBoard');

        targets.forEach(target => {
            const dot = document.createElement("div");
            dot.style.position = "absolute";
            dot.style.width = "16px";
            dot.style.height = "16px";
            dot.style.background = "rgba(255,0,0,0.8)";
            dot.style.borderRadius = "50%";
            dot.style.transform = "translate(-50%, -50%)";
            dot.style.left = (target.x / img.naturalWidth) * 100 + "%";
            dot.style.top = (target.y / img.naturalHeight) * 100 + "%";
            dot.style.pointerEvents = "none";
             board.appendChild(dot);
        });
    }
    
        
</script>
</body>
</html>
